name: Immergas Dominus Bridge
version: "0.1.0"
slug: immergas_bridge
description: MQTT bridge for Immergas Magis Combo Plus V2 with Dominus
url: https://github.com/harykx/dominus-ha/immergas-bridge
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
startup: services
boot: auto
init: false
host_network: false
map:
  - addon_config:rw
options:
  heater_host: 192.168.1.50
  heater_port: 2000
  heater_mac: "00:11:22:33:44:55"
  heater_password: "YOUR_HEATER_PASSWORD"
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_client_id: immergas-ha-bridge
  topic_root: immergas
  fast_poll_seconds: 15
  slow_poll_seconds: 60
  socket_timeout_seconds: 2.0
  reconnect_seconds: 5
  log_level: INFO
  debug_frames: false
schema:
  heater_host: str
  heater_port: port
  heater_mac: str
  heater_password: password
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  mqtt_client_id: str
  topic_root: str
  fast_poll_seconds: float
  slow_poll_seconds: float
  socket_timeout_seconds: float
  reconnect_seconds: float
  log_level: list(TRACE|DEBUG|INFO|WARNING|ERROR|CRITICAL)?
  debug_frames: bool
