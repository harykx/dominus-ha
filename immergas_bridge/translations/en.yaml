configuration:
  heater_host:
    name: Heater host
    description: IP address of the Immergas Wi-Fi/LAN module.
  heater_port:
    name: Heater port
    description: TCP port of the Immergas module, normally 2000.
  heater_mac:
    name: Heater MAC
    description: MAC address used to generate the auth string.
  heater_password:
    name: Heater password
    description: Password used to generate the auth string.
  mqtt_host:
    name: MQTT host
    description: MQTT broker hostname. For the Mosquitto add-on use core-mosquitto.
  mqtt_port:
    name: MQTT port
    description: MQTT broker port.
  mqtt_username:
    name: MQTT username
    description: MQTT username, if required.
  mqtt_password:
    name: MQTT password
    description: MQTT password, if required.
  mqtt_client_id:
    name: MQTT client ID
    description: Client ID used by the add-on.
  topic_root:
    name: Topic root
    description: Root topic used by the bridge.
  fast_poll_seconds:
    name: Fast poll seconds
    description: Poll interval for frequently changing values.
  slow_poll_seconds:
    name: Slow poll seconds
    description: Poll interval for less frequently changing values.
  socket_timeout_seconds:
    name: Socket timeout seconds
    description: TCP socket timeout.
  reconnect_seconds:
    name: Reconnect seconds
    description: Delay before reconnect after failure.
  log_level:
    name: Log level
    description: Logging verbosity.
  debug_frames:
    name: Debug frames
    description: Log raw protocol frames and post-auth echo.
